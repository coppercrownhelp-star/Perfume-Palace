<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfume Palace - Home</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<header class="navbar">
  <div class="logo">PERFUME PALACE</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html" target="_blank">Perfumes</a>
    <a href="about.html" target="_blank">About</a>
    <a href="contact.html" target="_blank">Contact</a>
  </nav>
  <button class="shop-btn" onclick="openOrder()">Shop Now</button>
</header>

<section class="hero">
  <h1>Smell the Future</h1>
  <p>Luxury futuristic perfumes for modern lifestyle</p>
</section>

<div id="orderModal" class="modal">
  <div class="modal-content">
    <span onclick="closeOrder()" class="close">×</span>
    <h2>Order Perfume</h2>

    <form onsubmit="submitOrder(event)">
      <input name="name" placeholder="Name" required />
      <input name="email" placeholder="Email" required />
      <input name="phone" placeholder="Phone" required />

      <select name="product">
        <option>Nebula Noir</option>
        <option>Lunar Essence</option>
        <option>Velvet Infinity</option>
      </select>

      <input name="quantity" type="number" min="1" value="1" />

      <button type="submit">Place Order</button>
    </form>
  </div>
</div>

<script src="assets/script.js"></script>
</body>
</html>

<script src="app.js"></script>
